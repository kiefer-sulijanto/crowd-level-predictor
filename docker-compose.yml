services:
  # Backend API Server
  backend:
    build: .
    volumes:
      - ./backend:/app/backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - MODEL_PATH=ml/models/Gradient_Boosting_Regressor.pkl
    ports:
      - "8000:8000"
    command: uvicorn backend.src.another_backend_api:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mlflow_ui

  # Simple Web Frontend
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with live-reloading on Windows
    depends_on:
      - backend

  # MLflow Tracking Server
  mlflow_ui:
    build: .
    ports:
      - "5000:5000"
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri ${MLFLOW_TRACKING_URI}
      --default-artifact-root ./artifacts

  # Airflow Scheduler & Webserver (Simplified for Dev)
  airflow:
    build: .
    volumes:
      - ./airflow/dags:/app/dags
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
    ports:
      - "8080:8080"
    command: airflow standalone

